name: Deploy Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'scripts/cloudflare-*.mjs'
      - 'cloudflare-worker.mjs'
      - 'wrangler.jsonc'
      - 'package.json'
      - 'package-lock.json'
      - 'deploy/cloudflare-build.env'
      - 'vite.config.js'
      - 'index.html'
      - '.github/workflows/cloudflare-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_URL: https://midbzlmbssalgsmcjmmw.supabase.co
      SUPABASE_ANON_KEY: sb_publishable_xwImfM2rB4fjzM5pUFSnJg_okkHRWCg
      VITE_SUPERUSER_EMAILS: kondratovic91@mail.ru

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Cloudflare token secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Добавьте CLOUDFLARE_API_TOKEN в Settings → Secrets → Actions"
            exit 1
          fi
          npx wrangler whoami

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 63d3b1a7291d3b38f203cf7f0c42a9f5
          command: deploy
