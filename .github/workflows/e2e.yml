name: E2E (Playwright)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      # Supabase — фронт (Vite) + e2e helpers + backend
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
      # E2E superuser (опционально — без пароля тест notion-delete пропускается)
      E2E_SUPERUSER_PASSWORD: ${{ secrets.E2E_SUPERUSER_PASSWORD }}
      E2E_SUPERUSER_EMAIL: kondratovic91@mail.ru
      # Backend
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      NOTION_SECRET: ${{ secrets.NOTION_SECRET }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      SUPERUSER_EMAILS: kondratovic91@mail.ru
      VITE_SUPERUSER_EMAILS: kondratovic91@mail.ru
      CORS_ORIGINS: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Run Playwright tests
        run: npm run test:e2e
