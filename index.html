<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preload" as="image" href="/background/windrise-1920.webp" type="image/webp" />
    <link rel="preload" as="image" href="/background/windrise-1920.jpg" type="image/jpeg" />
    <style>
      html, body { margin: 0; min-height: 100%; }
      body {
        background-color: #4a6280;
        background-image: url('/background/windrise-1920.jpg');
        background-position: center;
        background-size: cover;
        background-attachment: scroll;
        color: #fff;
        font-family: system-ui, sans-serif;
      }
      #evening-dim {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background: linear-gradient(
          180deg,
          rgba(8, 12, 28, 0.12) 0%,
          rgba(6, 10, 24, 0.18) 42%,
          rgba(4, 8, 20, 0.3) 100%
        );
      }
      #sunset-scene {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 60%;
        pointer-events: none;
        z-index: 0;
        background: linear-gradient(
          180deg,
          rgba(14, 20, 48, 0.62) 0%,
          rgba(38, 34, 72, 0.54) 16%,
          rgba(72, 42, 82, 0.46) 34%,
          rgba(138, 58, 72, 0.4) 52%,
          rgba(208, 92, 58, 0.32) 72%,
          rgba(242, 132, 68, 0.2) 88%,
          transparent 100%
        );
        -webkit-mask-image: linear-gradient(180deg, #000 0%, #000 70%, transparent 100%);
        mask-image: linear-gradient(180deg, #000 0%, #000 70%, transparent 100%);
      }
      #root { min-height: 100vh; position: relative; z-index: 1; }
      #root .boot-loader {
        padding: 1.25rem 1.5rem;
        font-size: 1rem;
        color: #fff;
        text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Genshin Calculator</title>
  </head>
  <body class="text-white">
    <div id="evening-dim" aria-hidden="true"></div>
    <div id="sunset-scene" aria-hidden="true"></div>
    <div id="root"><p class="boot-loader">Загрузка приложения…</p></div>
    <script>
      (function () {
        var root = document.getElementById('root');

        function showBootHelp(title, lines) {
          if (!root || !root.querySelector('.boot-loader')) return;
          root.innerHTML =
            '<div style="padding:1.5rem;color:#fff;font-family:system-ui,sans-serif;max-width:720px">'
            + '<h1 style="color:#fff;margin:0 0 1rem">' + title + '</h1>'
            + lines.map(function (line) {
              return '<p style="margin:0 0 0.75rem;line-height:1.5">' + line + '</p>';
            }).join('')
            + '</div>';
        }

        if (window.location.protocol === 'file:') {
          showBootHelp('Откройте через dev-сервер', [
            'Файл index.html нельзя открывать напрямую — браузер не выполнит React-код.',
            'В терминале в папке проекта: <code style="background:rgba(0,0,0,0.35);padding:2px 6px;border-radius:6px">npm run dev</code>',
            'Затем откройте адрес из терминала, например <code style="background:rgba(0,0,0,0.35);padding:2px 6px;border-radius:6px">http://localhost:5173</code>',
          ]);
          return;
        }

        window.setTimeout(function () {
          showBootHelp('Приложение не запустилось', [
            'JavaScript не загрузился или завершился с ошибкой.',
            '1. Убедитесь, что выполнен <code style="background:rgba(0,0,0,0.35);padding:2px 6px;border-radius:6px">npm run dev</code> и страница открыта по адресу из терминала.',
            '2. Нажмите F12 → вкладка Console и посмотрите красные ошибки.',
            '3. Обновите страницу (Ctrl+F5).',
          ]);
        }, 12000);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
