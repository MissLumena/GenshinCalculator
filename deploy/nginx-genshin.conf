# Замените YOUR_HOST на ваш No-IP hostname, например genshin-calc.ddns.net
# Скопировать: sudo cp deploy/nginx-genshin.conf /etc/nginx/sites-available/genshin
# Затем: sudo ln -sf /etc/nginx/sites-available/genshin /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name YOUR_HOST;

    root /home/ubuntu/GenshinCalculator/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
